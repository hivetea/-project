<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3 Maritime Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Leaflet dependency (Replaces globe.gl) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        /* Map Override */
        #globeViz { width: 100vw; height: 100vh; background: #050510; }
        
        /* Leaflet popup dark mode override */
        .leaflet-popup-content-wrapper {
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #a0c0d0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }
        .leaflet-popup-tip {
            background: rgba(10, 15, 25, 0.95);
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            color: #222;
            z-index: 9999;
            pointer-events: auto;
            width: 280px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Reset Leaflet marker default styles for custom SVGs */
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }

        /* Seamless horizontal flowing animation for sine waves */
        @keyframes flow {
            0% { transform: translateX(0px); }
            100% { transform: translateX(100px); }
        }
    </style>
</head>
<body>
    <!-- The Map Container -->
    <div id="globeViz"></div>
    
    <!-- UI Overlay -->
    <div class="overlay">
        <h1>Maritime Safety Intel</h1>
        <p>Live CWA Coastal Gateway</p>
        
        <div class="legend" style="display: flex; flex-direction: column; gap: 5px;">
            <div style="font-weight: 600; margin-bottom: 2px;">Danger Level (0 - 10)</div>
            <div style="width: 100%; height: 10px; background: linear-gradient(to right, rgb(20,100,255), rgb(0,255,255), rgb(255,255,0), rgb(255,140,0), rgb(255,30,30)); border-radius: 5px;"></div>
            <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 2px;">
                <span>0.0</span><span>2.5</span><span>5.0</span><span>7.5</span><span>10.0</span>
            </div>
        </div>
    </div>

    <script src="main.js?v=28"></script>
</body>
</html>
